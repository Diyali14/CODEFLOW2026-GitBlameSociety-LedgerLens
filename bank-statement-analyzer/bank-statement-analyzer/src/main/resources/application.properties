#spring.datasource.url=jdbc:postgresql://dpg-d897uereo5us738j2iu0-a.singapore-postgres.render.com:5432/bank_ai
#spring.datasource.username=bank_ai_user
#spring.datasource.password=MBKteFyBXd1SsEm5rvsdHzOlF2Dorw3l

spring.datasource.url=${POSTGRES_DATASOURCE_URL}
spring.datasource.username=${POSTGRES_DATASOURCE_USERNAME}
spring.datasource.password=${POSTGRES_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# -------------------------------------------------------
# JPA / Hibernate
# -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# -------------------------------------------------------
# File upload limits
# -------------------------------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# -------------------------------------------------------
# External AI service
# -------------------------------------------------------
anomaly.api.url=${ANOMALY_API_URL:https://anomaly-detection-model-4sk4.onrender.com/detect-anomaly}

# -------------------------------------------------------
# CORS — frontend origin allowed to call this backend
# Set CORS_ALLOWED_ORIGIN in your OS / Docker / CI environment or .env file.
# Local dev default: http://localhost:5173 (Vite)
# Production:        https://your-app.vercel.app  (no trailing slash)
# -------------------------------------------------------
# CorsConfig.java reads CORS_ALLOWED_ORIGIN directly from env via @Value

# -------------------------------------------------------
# Server port — defaults to 8080
# -------------------------------------------------------
server.port=${SERVER_PORT:8080}
